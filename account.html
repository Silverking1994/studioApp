<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creativia Account</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#0b0f16;
  color:#fff;
}

#app{
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>
<body>

<div id="app">
  <div id="loading">Waiting for data...</div>
  <div id="account-root" style="display:none;"></div>
</div>

<script>
/* =========================
   GLOBAL STATE
========================= */
window.APP_STATE = {
  user: null,
  pageData: null
};

/* =========================
   RENDER TRIGGER
========================= */
function initAccountPage(payload){
  window.APP_STATE.user = payload.user || {};
  window.APP_STATE.pageData = payload.pageData || {};

  document.getElementById("loading").style.display = "none";
  document.getElementById("account-root").style.display = "block";

  // Load external account script AFTER data is ready
  loadScript(payload.scriptUrl || "./account.js");
}

/* =========================
   LOAD SCRIPT DYNAMICALLY
========================= */
function loadScript(src){
  const script = document.createElement("script");
  script.src = src;
  script.onload = () => {
    console.log("account.js loaded");
    if(window.renderAccountPage){
      window.renderAccountPage(window.APP_STATE);
    }
  };
  document.body.appendChild(script);
}

/* =========================
   LISTEN FROM PARENT (WIX)
========================= */
window.addEventListener("message", (event) => {

  if(event.data && event.data.type === "INIT_APP"){
    console.log("INIT received", event.data.payload);

    initAccountPage(event.data.payload);
  }

});

</script>

</body>
</html>
