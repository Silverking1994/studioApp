<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Email Template Editor</title>
<style>
body { margin:0;font-family:Arial,sans-serif;background:#0f1115;color:#fff;display:flex;height:100vh; }
.sidebar { width:300px;background:#1a1d24;padding:20px;border-right:1px solid #2a2f3a;overflow-y:auto; }
.sidebar h2 { margin:15px 0 10px;font-size:14px;color:#aaa; }
.sidebar button { width:100%;margin-bottom:8px;padding:10px;border:none;background:#2d3340;color:#fff;cursor:pointer;border-radius:6px;font-size:13px; }
.sidebar button:hover { background:#3b4252; }
textarea { width:100%;height:120px;background:#0f1115;color:#fff;border:1px solid #333;border-radius:6px;padding:8px;font-size:12px; }
.editor { flex:1;display:flex;flex-direction:column; }
.toolbar { padding:10px;background:#1a1d24;border-bottom:1px solid #2a2f3a; }
.toolbar button { margin-right:10px;padding:8px 12px;border:none;background:#2d3340;color:white;border-radius:6px;cursor:pointer; }
.toolbar button:hover { background:#3b4252; }
#canvas { flex:1;background:#f4f4f4;padding:20px;overflow:auto; }
.email-container { max-width:600px;margin:auto;background:white;color:#000;padding:20px;border-radius:8px; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>Blocks</h2>
  <button onclick="addBlock('header')">Header</button>
  <button onclick="addBlock('text')">Text</button>
  <button onclick="addBlock('button')">Button</button>
  <button onclick="addBlock('footer')">Footer</button>

  <h2>Templates</h2>
  <button onclick="loadTemplate('legal')">Legal Firm Email</button>
  <button onclick="loadTemplate('corporate')">Corporate Response</button>

  <h2>Paste HTML Template</h2>
  <textarea id="htmlInput" placeholder="Paste full HTML email template here..."></textarea>
  <button onclick="importPastedHTML()">Render Template</button>

  <h2>Export</h2>
  <button onclick="copyForEmail()">Copy for Mail.com</button>
  <button onclick="exportHTML()">Download HTML</button>
</div>

<div class="editor">
  <div class="toolbar">
    <button onclick="clearCanvas()">Clear</button>
  </div>

  <div id="canvas">
    <div class="email-container" id="emailContent"></div>
  </div>
</div>

<script>

const templates = {

  legal: `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law Firm Email</title>
<style>
  /* Responsive adjustments */
  @media only screen and (max-width: 620px) {
    .main-container {
      width: 95% !important;
    }
    .header-table, .body-table {
      width: 100% !important;
    }
    .header-text h2 {
      font-size: 18px !important;
    }
    .header-text p {
      font-size: 13px !important;
    }
    .cta-button {
      width: 100% !important;
      box-sizing: border-box;
      text-align: center !important;
    }
  }
</style>
</head>

<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:20px;">
<tr>
<td align="center">

<!-- MAIN CONTAINER -->
<table class="main-container" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:6px;overflow:hidden;max-width:600px;width:100%;">

  <!-- HEADER -->
  <tr>
    <td style="padding:20px;background-color:#2f6f73;color:#ffffff;">
      <table class="header-table" width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td width="70" style="padding-right:10px;">
            <img src="https://share1.cloudhq-mkt3.net/a9e4b00e527675.png" width="60" style="display:block;border:0;max-width:100%;">
          </td>
          <td class="header-text" style="vertical-align:middle;">
            <h2 style="margin:0;color:#ffffff;font-size:20px;">BLADE LAW FIRM</h2>
            <p style="margin:0;color:#e0e0e0;font-weight:bold;font-size:14px;">FRANKLIN, THOMAS & GATES</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- BODY -->
  <tr>
    <td style="padding:25px;color:#333333;font-size:14px;line-height:1.7;background:#f0f2f3;text-align:left;">

      <p>Dear <strong>*|NAME|*</strong>,</p>

      <p>Thank you for contacting <strong>Franklin, Thomas &amp; Gates</strong>. We appreciate the opportunity to assist you.</p>

      <p>Kindly complete the attached intake form and return it at your earliest convenience. You may reply directly to this email or send via fax to <strong>(123) 456-7890</strong>.</p>

      <p>📎 <a href="#" style="color:#2f6f73;font-weight:bold;text-decoration:none;">Download Intake Form</a></p>

      <p>If your matter is urgent, please contact our office immediately at <strong>(123) 456-7890</strong>.</p>

      <p>Otherwise, a member of our legal team will reach out shortly to schedule your consultation.</p>

      <p>We look forward to assisting you and working toward a timely resolution.</p>

      <p style="margin-top:25px;">
        Sincerely,<br><br>
        <strong>Franklin, Thomas &amp; Gates</strong><br>
        Bankruptcy Attorneys<br>
        (232) 383-4059
      </p>

      <!-- CTA BUTTON -->
      <div style="margin-top:20px;text-align:center;">
        <a href="#" class="cta-button" style="display:inline-block;padding:12px 20px;background:#2f6f73;color:#ffffff;text-decoration:none;border-radius:20px;font-size:14px;">Schedule a Consultation</a>
      </div>

    </td>
  </tr>

  <!-- FOOTER -->
  <tr>
    <td style="background-color:#d2dfe1;padding:20px;text-align:center;font-size:11px;color:#555555;">
      
      <img src="https://share1.cloudhq-mkt3.net/a9e4b00e527675.png" width="40" style="display:block;margin:0 auto 10px;border:0;max-width:100%;">
      
      <strong>BLADE LAW FIRM</strong><br>
      FRANKLIN, THOMAS & GATES<br><br>

      *|USER:ADDRESS|*<br>
      *|USER:URL|*<br><br>

      <a href="*|UNSUB|*" style="color:#555555;text-decoration:none;">Unsubscribe</a>

    </td>
  </tr>

</table>
<!-- END CONTAINER -->

</td>
</tr>
</table>

</body>
</html>`,
  corporate: `<table width="100%"><tr><td><p>Dear [Recipient],</p><p>We have reviewed your message.</p><p>Sincerely,<br><strong>Corporate Affairs</strong></p></td></tr></table>`
};

function loadTemplate(type){ document.getElementById('emailContent').innerHTML = templates[type]; }

function importPastedHTML(){
  const raw = document.getElementById('htmlInput').value;
  if(!raw) return alert('Paste HTML first');

  const parser = new DOMParser();
  const doc = parser.parseFromString(raw, 'text/html');

  // Extract body content safely
  const bodyContent = doc.body ? doc.body.innerHTML : raw;

  document.getElementById('emailContent').innerHTML = bodyContent;
}

function addBlock(type){
  const container = document.getElementById('emailContent');
  let el="";

  if(type==='header') el=`<h2>Email Title</h2>`;
  if(type==='text') el=`<p>Edit your text here...</p>`;
  if(type==='button') el=`<a href="#" style="display:inline-block;padding:10px 15px;background:#000;color:#fff;text-decoration:none;">Call To Action</a>`;
  if(type==='footer') el=`<p style="font-size:12px;color:#777;">Footer</p>`;

  container.innerHTML += el;
}

function generateEmailHTML(){
  const content = document.getElementById('emailContent').innerHTML;

  return `<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:20px;font-family:Arial;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;padding:20px;">
        <tr><td>${content}</td></tr>
      </table>
    </td></tr>
  </table>`;
}

function copyForEmail(){
  const html = generateEmailHTML();
  navigator.clipboard.writeText(html).then(()=>alert('Copied! Paste into Mail.com'));
}

function exportHTML(){
  const html = generateEmailHTML();
  const blob = new Blob([html], {type:'text/html'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'email-template.html';
  link.click();
}

function clearCanvas(){ document.getElementById('emailContent').innerHTML=''; }

</script>

</body>
</html>
