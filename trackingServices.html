<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking Services</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #111;
  color: white;
  cursor: pointer;
  border: none;
}

button:hover {
  background: #333;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Tracking Service</h2>
    <p>Enter your tracking ID below:</p>

    <input id="tracking-input" placeholder="Enter tracking ID..." />
    <button id="track-btn">Track Package</button>
  </div>

  <div class="card" id="result-card" style="display:none;">
    <h3>Tracking Result</h3>
    <p id="result-text"></p>
  </div>

</div>

<!-- The script will be injected by AppFrame -->
<script src="trackingService.js"></script>

</body>
</html>
